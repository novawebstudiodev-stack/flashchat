<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashChat</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<div class="app">

  <!-- ── SIDEBAR ────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <!-- My profile header -->
    <div class="sidebar__header">
      <div class="sidebar__me">
        <div class="avatar avatar--sm">
          <img id="my-avatar" src="assets/default-avatar.svg" alt="Me" />
        </div>
        <span class="sidebar__username" id="my-username"></span>
      </div>
      <button class="icon-btn" id="logout-btn" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="sidebar__search">
      <div class="search-box">
        <svg class="search-box__icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search users…" autocomplete="off" />
      </div>
      <div class="search-results hidden" id="search-results"></div>
    </div>

    <!-- Conversations -->
    <div class="sidebar__section-label">Messages</div>
    <div class="conv-list" id="conv-list"></div>

  </aside>

  <!-- ── CHAT PANEL ─────────────────────────────────────── -->
  <main class="chat-panel" id="chat-panel">

    <!-- Empty state -->
    <div class="chat-empty" id="chat-empty">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="28" fill="var(--bg-tertiary)"/>
        <path d="M18 34L28 16L38 34" stroke="var(--accent)" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="28" cy="37" r="3" fill="var(--accent)"/>
      </svg>
      <p>Select a conversation or search for someone to message</p>
    </div>

    <!-- Chat header -->
    <header class="chat-header" id="chat-header"></header>

    <!-- Messages list -->
    <div class="messages-list" id="messages-list">
      <div class="typing-indicator hidden" id="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Image preview bar -->
    <div class="image-preview-bar hidden" id="image-preview">
      <img id="preview-img" src="" alt="preview" />
      <button class="image-preview-bar__cancel" id="cancel-preview">✕</button>
    </div>

    <!-- Compose bar -->
    <div class="compose">
      <button class="icon-btn compose__image-btn" id="image-btn" title="Send image">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input id="image-file-input" type="file" accept="image/*" class="hidden" />

      <textarea id="msg-input" placeholder="Type a message…" rows="1"
                maxlength="1000" autocomplete="off"></textarea>

      <button class="btn btn--send" id="send-btn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </main>
</div>

<!-- Socket.IO client from CDN -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/socket.js"></script>
<script src="js/image.js"></script>
<script src="js/messages.js"></script>
<script src="js/chat.js"></script>
</body>
</html>

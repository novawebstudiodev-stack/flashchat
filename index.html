<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashChat — Sign In</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-card__logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="20" fill="var(--accent)"/>
        <path d="M10 26L20 10L30 26" stroke="var(--bg-primary)" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="20" cy="27" r="2.5" fill="var(--bg-primary)"/>
      </svg>
      <span>FlashChat</span>
    </div>

    <p class="auth-card__tagline">Messages that disappear. Conversations that matter.</p>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign in</button>
      <button class="auth-tab" id="tab-register">Create account</button>
    </div>

    <!-- Login form -->
    <form id="form-login" class="auth-form" autocomplete="on">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com"
               autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Your password"
               autocomplete="current-password" required />
      </div>
      <p class="form-error" id="login-error"></p>
      <button type="submit" class="btn btn--primary btn--full">Sign in</button>
    </form>

    <!-- Register form -->
    <form id="form-register" class="auth-form hidden" autocomplete="on">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input id="reg-username" type="text" placeholder="yourname"
               autocomplete="username" pattern="[a-zA-Z0-9_]+" minlength="3" maxlength="30" required />
        <span class="form-hint">Letters, numbers, underscores only</span>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com"
               autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" placeholder="Min 6 characters"
               autocomplete="new-password" minlength="6" required />
      </div>
      <p class="form-error" id="register-error"></p>
      <button type="submit" class="btn btn--primary btn--full">Create account</button>
    </form>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
